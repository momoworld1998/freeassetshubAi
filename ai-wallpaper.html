<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Wallpaper Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen p-6">
<div class="max-w-5xl mx-auto">
<h1 class="text-4xl font-bold mb-6">AI Wallpaper Generator</h1>

<div class="bg-zinc-900 p-5 rounded-2xl">
<label class="block mb-2 text-lg">Wallpaper Prompt</label>
<textarea id="prompt" class="w-full h-32 p-4 rounded-xl bg-zinc-800 border border-zinc-700" placeholder="Example: Ultra realistic cyberpunk wallpaper, neon city, 4k"></textarea>

<div class="grid md:grid-cols-2 gap-4 mt-4">
<select id="ratio" class="p-3 rounded-xl bg-zinc-800 border border-zinc-700">
<option value="16:9">Desktop 16:9</option>
<option value="9:16">Mobile 9:16</option>
<option value="1:1">Square 1:1</option>
</select>

<button onclick="generateWallpaper()" class="bg-purple-600 hover:bg-purple-700 p-3 rounded-xl font-bold">
Generate Wallpaper
</button>
</div>
</div>

<div id="loading" class="hidden mt-6 text-xl">Generating wallpaper...</div>

<div id="gallery" class="grid md:grid-cols-2 gap-6 mt-8"></div>
</div>

<script src="./js/gemini-ai.js"></script>
</body>
</html>
