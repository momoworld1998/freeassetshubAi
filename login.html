<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – FreeAssetsHub</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{display:['Syne'],body:['DM Sans']},colors:{brand:{500:'#8b5cf6',600:'#7c3aed'},accent:{500:'#3b82f6'}}}}}</script>
</head>
<body class="bg-gray-950 text-white font-body flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md px-4">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-accent-500 flex items-center justify-center mx-auto mb-4">
          <i data-lucide="shield" class="w-7 h-7 text-white"></i>
        </div>
        <h1 class="font-display font-bold text-2xl text-white">Admin Panel</h1>
        <p class="text-gray-400 text-sm mt-1">FreeAssetsHub Dashboard</p>
      </div>
      <form id="loginForm" onsubmit="adminLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Username</label>
          <input type="text" id="adminUser" placeholder="admin" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-brand-500 transition-colors" />
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Password</label>
          <input type="password" id="adminPass" placeholder="••••••••" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-brand-500 transition-colors" />
        </div>
        <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
          <input type="checkbox" id="rememberMe" class="rounded" />
          Keep me logged in for 7 days
        </label>
        <div id="loginError" class="hidden text-red-400 text-sm text-center py-2 bg-red-900/20 rounded-lg border border-red-800">Invalid username or password</div>
        <button type="submit" class="w-full bg-gradient-to-r from-brand-600 to-accent-500 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition-opacity">
          Login to Dashboard
        </button>
      </form>
      <p class="text-gray-600 text-xs text-center mt-4">Default: admin / admin123 (change in production)</p>
    </div>
    <p class="text-center mt-4"><a href="../index.html" class="text-gray-500 text-sm hover:text-gray-300">← Back to Website</a></p>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
    // Simple client-side auth — replace with server-side auth in production
    const ADMIN_USER = 'admin';
    const adminSettings = JSON.parse(localStorage.getItem('adminSettings') || '{}');
    const ADMIN_PASS = adminSettings.adminPass || 'admin123'; // CHANGE THIS IN PRODUCTION

    // ---- Check for existing valid session ----
    function hasValidSession() {
      const auth   = localStorage.getItem('adminAuth');
      const expiry = parseInt(localStorage.getItem('adminAuthExpiry') || '0', 10);
      if (auth === 'true' && Date.now() < expiry) return true;
      // Session expired or invalid — clear it
      localStorage.removeItem('adminAuth');
      localStorage.removeItem('adminAuthExpiry');
      return false;
    }
    if (hasValidSession()) window.location.href = 'dashboard.html';

    function adminLogin(e) {
      e.preventDefault();
      const u = document.getElementById('adminUser').value;
      const p = document.getElementById('adminPass').value;
      const remember = document.getElementById('rememberMe').checked;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        const durationMs = remember ? 7 * 24 * 60 * 60 * 1000 : 60 * 60 * 1000; // 7 days or 1 hour
        localStorage.setItem('adminAuth', 'true');
        localStorage.setItem('adminAuthExpiry', String(Date.now() + durationMs));
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginError').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
